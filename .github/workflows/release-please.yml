# Conventional-Commits release automation for @diffdeckai/playwright-reporter.
#
# On every push to main, release-please parses the Conventional Commits since the
# last release and maintains a "release PR" that bumps the version + updates
# CHANGELOG.md. When that PR is merged, release-please tags a GitHub Release and
# this same run publishes the package to npm using OIDC **trusted publishing**
# (no NPM_TOKEN — configure the trusted publisher once at
# npmjs.com → @diffdeckai/playwright-reporter → Settings → Trusted Publisher,
# pointing at this repo + workflow).
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + trusted publishing

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      # ── Publish only when a release was just created ──────────────────────
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports trusted publishing
        if: ${{ steps.release.outputs.release_created == 'true' }}
        # Trusted publishing needs npm >= 11.5.1. Pin to the 11.x line: `npm@latest`
        # (now 12.x) dropped Node 20 and needs Node >= 22.22, which broke this step;
        # npm 11.x supports trusted publishing on Node 22 without chasing latest.
        run: npm install -g npm@11
      - run: npm ci
        if: ${{ steps.release.outputs.release_created == 'true' }}
      - run: npm run build
        if: ${{ steps.release.outputs.release_created == 'true' }}
      - run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.release_created == 'true' }}
